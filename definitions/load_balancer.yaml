name: LoadBalancer
module_name: azure_rm_loadbalancer
description: "Manage Azure load balancers."
api_version: "2024-03-01"
provider: Microsoft.Network
resource_type: loadBalancers
generate_info: true
author: "Azure Magic Modules Generator"
doc_url: "https://learn.microsoft.com/en-us/azure/load-balancer/load-balancer-overview"
properties:
  name:
    type: str
    required: true
    description: "Name of the load balancer."
  resource_group:
    type: str
    required: true
    description: "Name of the resource group."
  location:
    type: str
    required: true
    description: "Azure region."
    api_field: location
    location: body
  sku_name:
    type: str
    description: "SKU name of the load balancer."
    api_field: sku.name
    location: body
    choices:
      - Basic
      - Standard
      - Gateway
  sku_tier:
    type: str
    description: "SKU tier of the load balancer."
    api_field: sku.tier
    location: body
    choices:
      - Regional
      - Global
  frontend_ip_configurations:
    type: list
    description: "List of frontend IP configurations."
    api_field: frontendIPConfigurations
    location: body
    element:
      type: dict
      properties:
        name:
          type: str
          required: true
          description: "Name of the frontend IP configuration."
        public_ip_address_id:
          type: str
          description: "Resource ID of the public IP address."
        subnet_id:
          type: str
          description: "Resource ID of the subnet."
        private_ip_address:
          type: str
          description: "Static private IP address."
        private_ip_allocation_method:
          type: str
          description: "Private IP allocation method."
  tags:
    type: dict
    description: "Resource tags."
    location: tags
