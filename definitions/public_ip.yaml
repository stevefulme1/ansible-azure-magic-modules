name: PublicIPAddress
module_name: azure_rm_publicipaddress
description: "Manage Azure public IP addresses."
api_version: "2024-03-01"
provider: Microsoft.Network
resource_type: publicIPAddresses
generate_info: true
author: "Azure Magic Modules Generator"
doc_url: "https://learn.microsoft.com/en-us/azure/virtual-network/ip-services/public-ip-addresses"
properties:
