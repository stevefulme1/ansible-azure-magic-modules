name: AksNodePool
module_name: azure_rm_aksnodepool
description: "Manage Azure Kubernetes Service agent pools."
api_version: "2024-02-01"
provider: Microsoft.ContainerService
resource_type: managedClusters/agentPools
generate_info: true
author: "Azure Magic Modules Generator"
doc_url: "https://learn.microsoft.com/en-us/azure/aks/create-node-pools"
properties:
  name:
    type: str
    required: true
    description: "Name of the node pool."
  resource_group:
    type: str
    required: true
    description: "Name of the resource group."
  cluster_name:
    type: str
    required: true
    description: "Name of the AKS cluster."
    api_field: managedClusterName
    location: body
  vm_size:
    type: str
    description: "VM size for the node pool agents."
    api_field: vmSize
    location: body
  count:
    type: int
    description: "Number of nodes in the node pool."
    api_field: count
    location: body
  min_count:
    type: int
    description: "Minimum number of nodes for autoscaling."
    api_field: minCount
    location: body
  max_count:
    type: int
    description: "Maximum number of nodes for autoscaling."
    api_field: maxCount
    location: body
  enable_auto_scaling:
    type: bool
    description: "Whether to enable node pool autoscaling."
    api_field: enableAutoScaling
    location: body
  os_type:
    type: str
    description: "Operating system type for the node pool."
    api_field: osType
    location: body
    choices:
      - Linux
      - Windows
  os_sku:
    type: str
    description: "OS SKU for the node pool."
    api_field: osSKU
    location: body
    choices:
      - Ubuntu
      - AzureLinux
      - CBLMariner
      - Windows2019
      - Windows2022
  mode:
    type: str
    description: "Mode of the node pool (System or User)."
    api_field: mode
    location: body
    choices:
      - System
      - User
  max_pods:
    type: int
    description: "Maximum number of pods per node."
    api_field: maxPods
    location: body
  availability_zones:
    type: list
    element_type: str
    description: "List of availability zones for the node pool."
    api_field: availabilityZones
    location: body
  node_labels:
    type: dict
    description: "Kubernetes labels applied to nodes in the pool."
    api_field: nodeLabels
    location: body
  node_taints:
    type: list
    element_type: str
    description: "Kubernetes taints applied to nodes in the pool."
    api_field: nodeTaints
    location: body
