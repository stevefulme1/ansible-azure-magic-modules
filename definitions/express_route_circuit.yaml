name: ExpressRouteCircuit
module_name: azure_rm_expressroutecircuit
description: "Manage Azure ExpressRoute circuits."
api_version: "2024-03-01"
provider: Microsoft.Network
resource_type: expressRouteCircuits
generate_info: true
author: "Azure Magic Modules Generator"
doc_url: "https://learn.microsoft.com/en-us/azure/expressroute/expressroute-circuit-peerings"
properties:
  name:
    type: str
    required: true
    description: "Name of the ExpressRoute circuit."
  resource_group:
    type: str
    required: true
    description: "Name of the resource group."
  location:
    type: str
    required: true
    description: "Azure region."
    api_field: location
    location: body
  sku_name:
    type: str
    description: "SKU name of the ExpressRoute circuit."
    api_field: sku.name
    location: body
  sku_tier:
    type: str
    description: "SKU tier of the ExpressRoute circuit."
    api_field: sku.tier
    location: body
    choices:
      - Standard
      - Premium
  sku_family:
    type: str
    description: "SKU billing family of the ExpressRoute circuit."
    api_field: sku.family
    location: body
    choices:
      - MeteredData
      - UnlimitedData
  service_provider_name:
    type: str
    description: "Name of the ExpressRoute service provider."
    api_field: serviceProviderProperties.serviceProviderName
    location: body
  peering_location:
    type: str
    description: "Peering location of the ExpressRoute circuit."
    api_field: serviceProviderProperties.peeringLocation
    location: body
  bandwidth_in_mbps:
    type: int
    description: "Bandwidth in Mbps of the ExpressRoute circuit."
    api_field: serviceProviderProperties.bandwidthInMbps
    location: body
  tags:
    type: dict
    description: "Resource tags."
    location: tags
