name: SqlManagedInstance
module_name: azure_rm_sqlmanagedinstance
description: "Manage Azure SQL Managed Instance resources."
api_version: "2023-08-01-preview"
provider: Microsoft.Sql
resource_type: managedInstances
generate_info: true
author: "Azure Magic Modules Generator"
doc_url: "https://learn.microsoft.com/en-us/azure/azure-sql/managed-instance/sql-managed-instance-paas-overview"
properties:
  name:
    type: str
    required: true
    description: "Name of the SQL managed instance."
  resource_group:
    type: str
    required: true
    description: "Name of the resource group."
  location:
    type: str
    required: true
    description: "Azure region."
    api_field: location
    location: body
  sku_name:
    type: str
    description: "Name of the SKU for the managed instance."
    api_field: sku.name
    location: body
  sku_tier:
    type: str
    description: "Tier of the SKU for the managed instance."
    api_field: sku.tier
    location: body
  administrator_login:
    type: str
    description: "Administrator login name for the instance."
    api_field: administratorLogin
    location: properties
  administrator_login_password:
    type: str
    no_log: true
    description: "Administrator login password for the instance."
    api_field: administratorLoginPassword
    location: properties
  subnet_id:
    type: str
    description: "Resource ID of the subnet for the instance."
    api_field: subnetId
    location: properties
  vcores:
    type: int
    description: "Number of vCores for the managed instance."
    api_field: vCores
    location: properties
  storage_size_in_gb:
    type: int
    description: "Storage size in GB for the managed instance."
    api_field: storageSizeInGB
    location: properties
  license_type:
    type: str
    description: "License type for the managed instance."
    choices:
      - "LicenseIncluded"
      - "BasePrice"
    api_field: licenseType
    location: properties
  public_data_endpoint_enabled:
    type: bool
    description: "Whether the public data endpoint is enabled."
    api_field: publicDataEndpointEnabled
    location: properties
  tags:
    type: dict
    description: "Resource tags."
    location: tags
