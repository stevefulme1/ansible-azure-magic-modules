name: RouteTable
module_name: azure_rm_routetable
description: "Manage Azure route tables."
api_version: "2024-03-01"
provider: Microsoft.Network
resource_type: routeTables
generate_info: true
author: "Azure Magic Modules Generator"
doc_url: "https://learn.microsoft.com/en-us/azure/virtual-network/manage-route-table"
properties:
  name:
    type: str
    required: true
    description: "Name of the route table."
  resource_group:
    type: str
    required: true
    description: "Name of the resource group."
  location:
    type: str
    required: true
    description: "Azure region."
    api_field: location
    location: body
  disable_bgp_route_propagation:
    type: bool
    description: "Disable BGP route propagation."
    api_field: disableBgpRoutePropagation
    location: body
    default: false
  routes:
    type: list
    description: "List of routes in the route table."
    api_field: routes
    location: body
    element:
      type: dict
      properties:
        name:
          type: str
          required: true
          description: "Name of the route."
        address_prefix:
          type: str
          description: "Destination CIDR for the route."
        next_hop_type:
          type: str
          description: "Next hop type for the route."
          choices:
            - VirtualNetworkGateway
            - VnetLocal
            - Internet
            - VirtualAppliance
            - None
        next_hop_ip_address:
          type: str
          description: "Next hop IP address for VirtualAppliance routes."
  tags:
    type: dict
    description: "Resource tags."
    location: tags
