name: Subnet
module_name: azure_rm_subnet
description: "Manage Azure virtual network subnets."
api_version: "2024-03-01"
provider: Microsoft.Network
resource_type: virtualNetworks/subnets
generate_info: true
author: "Azure Magic Modules Generator"
doc_url: "https://learn.microsoft.com/en-us/azure/virtual-network/manage-subnet-delegation"
properties:
  name:
    type: str
    required: true
    description: "Name of the subnet."
  resource_group:
    type: str
    required: true
    description: "Name of the resource group."
  virtual_network_name:
    type: str
    required: true
    description: "Name of the virtual network containing the subnet."
    api_field: virtualNetworkName
    location: body
  address_prefix:
    type: str
    required: true
    description: "Address prefix in CIDR notation for the subnet."
    api_field: addressPrefix
    location: body
  network_security_group_id:
    type: str
    description: "Resource ID of the network security group to associate."
    api_field: networkSecurityGroup.id
    location: body
  route_table_id:
    type: str
    description: "Resource ID of the route table to associate."
    api_field: routeTable.id
    location: body
  service_endpoints:
    type: list
    description: "List of service endpoint strings."
    api_field: serviceEndpoints
    location: body
    element:
      type: str
  private_endpoint_network_policies:
    type: str
    description: "Enable or disable private endpoint network policies."
    api_field: privateEndpointNetworkPolicies
    location: body
    choices:
      - Enabled
      - Disabled
  delegation_name:
    type: str
    description: "Name of the delegation."
    api_field: delegations[0].name
    location: body
  delegation_service_name:
    type: str
    description: "Service name for the delegation."
    api_field: delegations[0].serviceName
    location: body
