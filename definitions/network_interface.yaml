name: NetworkInterface
module_name: azure_rm_networkinterface
description: "Manage Azure network interfaces."
api_version: "2024-03-01"
provider: Microsoft.Network
resource_type: networkInterfaces
generate_info: true
author: "Azure Magic Modules Generator"
doc_url: "https://learn.microsoft.com/en-us/azure/virtual-network/virtual-network-network-interface"
properties:
  name:
    type: str
    required: true
    description: "Name of the network interface."
  resource_group:
    type: str
    required: true
    description: "Name of the resource group."
  location:
    type: str
    required: true
    description: "Azure region."
    api_field: location
    location: body
  ip_configurations:
    type: list
    description: "List of IP configurations for the network interface."
    api_field: ipConfigurations
    location: body
    element:
      type: dict
      properties:
        name:
          type: str
          required: true
          description: "Name of the IP configuration."
        subnet_id:
          type: str
          description: "Resource ID of the subnet."
        private_ip_address:
          type: str
          description: "Static private IP address."
        private_ip_allocation_method:
          type: str
          description: "Private IP allocation method."
          choices:
            - Static
            - Dynamic
        public_ip_address_id:
          type: str
          description: "Resource ID of the public IP address."
        primary:
          type: bool
          description: "Whether this is the primary IP configuration."
  network_security_group_id:
    type: str
    description: "Resource ID of the network security group."
    api_field: networkSecurityGroup.id
    location: body
  enable_accelerated_networking:
    type: bool
    description: "Enable accelerated networking on the interface."
    api_field: enableAcceleratedNetworking
    location: body
  enable_ip_forwarding:
    type: bool
    description: "Enable IP forwarding on the interface."
    api_field: enableIPForwarding
    location: body
  tags:
    type: dict
    description: "Resource tags."
    location: tags
