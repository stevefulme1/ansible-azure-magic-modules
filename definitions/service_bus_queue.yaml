name: ServiceBusQueue
module_name: azure_rm_servicebusqueue
description: "Manage Azure Service Bus Queue instances."
api_version: "2022-10-01-preview"
provider: Microsoft.ServiceBus
resource_type: namespaces/queues
generate_info: true
author: "Azure Magic Modules Generator"
doc_url: "https://learn.microsoft.com/en-us/azure/service-bus-messaging/service-bus-queues-topics-subscriptions"
properties:
  name:
    type: str
    required: true
    description: "Name of the Service Bus Queue."
  resource_group:
    type: str
    required: true
    description: "Name of the resource group."
  namespace_name:
    type: str
    required: true
    description: "Name of the Service Bus Namespace."
  max_size_in_megabytes:
    type: int
    description: "Maximum size of the queue in megabytes."
    api_field: maxSizeInMegabytes
    location: body
  default_message_ttl:
    type: str
    description: "Default message time-to-live in ISO 8601 format."
    api_field: defaultMessageTimeToLive
    location: body
  lock_duration:
    type: str
    description: "Lock duration for peek-lock in ISO 8601 format."
    api_field: lockDuration
    location: body
  dead_lettering_on_message_expiration:
    type: bool
    description: "Whether to dead-letter messages on expiration."
    api_field: deadLetteringOnMessageExpiration
    location: body
  requires_duplicate_detection:
    type: bool
    description: "Whether duplicate detection is required."
    api_field: requiresDuplicateDetection
    location: body
  requires_session:
    type: bool
    description: "Whether sessions are required."
    api_field: requiresSession
    location: body
  max_delivery_count:
    type: int
    description: "Maximum delivery count before dead-lettering."
    api_field: maxDeliveryCount
    location: body
    default: 10
  enable_partitioning:
    type: bool
    description: "Whether partitioning is enabled."
    api_field: enablePartitioning
    location: body
