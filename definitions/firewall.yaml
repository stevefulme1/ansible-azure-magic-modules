name: AzureFirewall
module_name: azure_rm_azurefirewall
description: "Manage Azure firewalls."
api_version: "2024-03-01"
provider: Microsoft.Network
resource_type: azureFirewalls
generate_info: true
author: "Azure Magic Modules Generator"
doc_url: "https://learn.microsoft.com/en-us/azure/firewall/overview"
properties:
  name:
    type: str
    required: true
    description: "Name of the Azure firewall."
  resource_group:
    type: str
    required: true
    description: "Name of the resource group."
  location:
    type: str
    required: true
    description: "Azure region."
    api_field: location
    location: body
  sku_name:
    type: str
    description: "SKU name of the firewall."
    api_field: sku.name
    location: body
    choices:
      - AZFW_VNet
      - AZFW_Hub
  sku_tier:
    type: str
    description: "SKU tier of the firewall."
    api_field: sku.tier
    location: body
    choices:
      - Standard
      - Premium
      - Basic
  threat_intel_mode:
    type: str
    description: "Threat intelligence operation mode."
    api_field: threatIntelMode
    location: body
    choices:
      - Alert
      - Deny
      - "Off"
  firewall_policy_id:
    type: str
    description: "Resource ID of the associated firewall policy."
    api_field: firewallPolicy.id
    location: body
  virtual_hub_id:
    type: str
    description: "Resource ID of the virtual hub for hub firewalls."
    api_field: virtualHub.id
    location: body
  tags:
    type: dict
    description: "Resource tags."
    location: tags
