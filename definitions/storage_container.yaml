name: StorageContainer
module_name: azure_rm_storagecontainer
description: "Manage Azure Storage Blob Container instances."
api_version: "2023-05-01"
provider: Microsoft.Storage
resource_type: storageAccounts/blobServices/containers
generate_info: true
author: "Azure Magic Modules Generator"
doc_url: "https://learn.microsoft.com/en-us/azure/storage/blobs/storage-blobs-introduction"
properties:
  name:
    type: str
    required: true
    description: "Name of the blob container."
  resource_group:
    type: str
    required: true
    description: "Name of the resource group."
  account_name:
    type: str
    required: true
    description: "Name of the storage account."
  public_access:
    type: str
    description: "Level of public access to the container."
    default: None
    choices:
      - Container
      - Blob
      - None
    api_field: publicAccess
    location: body
  default_encryption_scope:
    type: str
    description: "Default encryption scope for the container."
    api_field: defaultEncryptionScope
    location: body
  deny_encryption_scope_override:
    type: bool
    description: "Whether to deny encryption scope override."
    api_field: denyEncryptionScopeOverride
    location: body
  immutable_storage_with_versioning_enabled:
    type: bool
    description: "Whether immutable storage with versioning is enabled."
    api_field: immutableStorageWithVersioning.enabled
    location: body
