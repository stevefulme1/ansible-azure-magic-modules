name: DevTestLab
module_name: azure_rm_devtestlab
description: "Manage Azure DevTest Lab instances."
api_version: "2018-09-15"
provider: Microsoft.DevTestLab
resource_type: labs
generate_info: true
author: "Azure Magic Modules Generator"
doc_url: "https://learn.microsoft.com/en-us/azure/devtest-labs/devtest-lab-overview"
properties:
  name:
    type: str
    required: true
    description: "Name of the DevTest Lab."
  resource_group:
    type: str
    required: true
    description: "Name of the resource group."
  location:
    type: str
    required: true
    description: "Azure region."
    api_field: location
    location: body
  lab_storage_type:
    type: str
    description: "Storage type for the lab."
    choices:
      - Standard
      - Premium
      - StandardSSD
    api_field: labStorageType
    location: body
  mandatory_artifacts_resource_ids_linux:
    type: list
    description: "Mandatory artifact resource IDs for Linux VMs."
    api_field: mandatoryArtifactsResourceIdsLinux
    location: body
  mandatory_artifacts_resource_ids_windows:
    type: list
    description: "Mandatory artifact resource IDs for Windows VMs."
    api_field: mandatoryArtifactsResourceIdsWindows
    location: body
  premium_data_disks:
    type: str
    description: "Whether premium data disks are allowed."
    choices:
      - Enabled
      - Disabled
    api_field: premiumDataDisks
    location: body
  environment_permission:
    type: str
    description: "Access permission for lab environments."
    choices:
      - Reader
      - Contributor
    api_field: environmentPermission
    location: body
  tags:
    type: dict
    description: "Resource tags."
    location: tags
