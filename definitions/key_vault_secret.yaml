name: KeyVaultSecret
module_name: azure_rm_keyvaultsecret
description: "Manage secrets in Azure Key Vault."
api_version: "2023-07-01"
provider: Microsoft.KeyVault
resource_type: vaults/secrets
generate_info: true
author: "Azure Magic Modules Generator"
doc_url: "https://learn.microsoft.com/en-us/azure/key-vault/secrets/"
properties:
  name:
    type: str
    required: true
    description: "Name of the secret."
  resource_group:
    type: str
    required: true
    description: "Name of the resource group."
  vault_name:
    type: str
    required: true
    description: "Name of the Key Vault."
    api_field: vaultName
    location: body
  value:
    type: str
    required: true
    description: "The value of the secret."
    api_field: value
    location: properties
    no_log: true
  content_type:
    type: str
    description: "Type of the secret value such as a password."
    api_field: contentType
    location: properties
  enabled:
    type: bool
    description: "Whether the secret is enabled."
    api_field: attributes.enabled
    location: properties
    default: true
  not_before:
    type: str
    description: "Secret not usable before this UTC datetime."
    api_field: attributes.nbf
    location: properties
  expires:
    type: str
    description: "Secret expiry UTC datetime."
    api_field: attributes.exp
    location: properties
