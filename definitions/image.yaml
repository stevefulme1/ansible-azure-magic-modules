name: Image
module_name: azure_rm_image
description: "Manage Azure custom image instances."
api_version: "2024-03-01"
provider: Microsoft.Compute
resource_type: images
generate_info: true
author: "Azure Magic Modules Generator"
doc_url: "https://learn.microsoft.com/en-us/azure/virtual-machines/image-version"
properties:
  name:
    type: str
    required: true
    description: "Name of the image."
  resource_group:
    type: str
    required: true
    description: "Name of the resource group."
  location:
    type: str
    required: true
    description: "Azure region."
    api_field: location
    location: body
  source_virtual_machine_id:
    type: str
    description: "Resource ID of the source virtual machine."
    api_field: sourceVirtualMachine.id
    location: body
  os_type:
    type: str
    description: "Operating system type of the image."
    api_field: storageProfile.osDisk.osType
    location: body
    choices:
      - Linux
      - Windows
  os_state:
    type: str
    description: "Operating system state of the image."
    api_field: storageProfile.osDisk.osState
    location: body
    choices:
      - Generalized
      - Specialized
  os_disk_blob_uri:
    type: str
    description: "URI of the OS disk blob."
    api_field: storageProfile.osDisk.blobUri
    location: body
  hyper_v_generation:
    type: str
    description: "Hyper-V generation of the virtual machine."
    api_field: hyperVGeneration
    location: body
    choices:
      - V1
      - V2
  tags:
    type: dict
    description: "Resource tags."
    location: tags
