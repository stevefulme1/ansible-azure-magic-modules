name: ContainerRegistry
module_name: azure_rm_containerregistry
description: "Manage Azure Container Registry instances."
api_version: "2023-07-01"
provider: Microsoft.ContainerRegistry
resource_type: registries
generate_info: true
author: "Azure Magic Modules Generator"
doc_url: "https://learn.microsoft.com/en-us/azure/container-registry/"
properties:
  name:
    type: str
    required: true
    description: "Name of the container registry."
  resource_group:
    type: str
    required: true
    description: "Name of the resource group."
  location:
    type: str
    required: true
    description: "Azure region."
    api_field: location
    location: body
  sku_name:
    type: str
    description: "SKU name for the container registry."
    api_field: sku.name
    location: body
    choices:
      - Basic
      - Standard
      - Premium
  admin_user_enabled:
    type: bool
    description: "Whether the admin user is enabled."
    api_field: adminUserEnabled
    location: body
    default: false
  public_network_access:
    type: str
    description: "Whether public network access is allowed."
    api_field: publicNetworkAccess
    location: body
    choices:
      - Enabled
      - Disabled
  zone_redundancy:
    type: str
    description: "Whether zone redundancy is enabled."
    api_field: zoneRedundancy
    location: body
    choices:
      - Enabled
      - Disabled
  encryption_status:
    type: str
    description: "Whether encryption is enabled."
    api_field: encryption.status
    location: body
    choices:
      - enabled
      - disabled
  tags:
    type: dict
    description: "Resource tags."
    location: tags
