name: DataLakeStore
module_name: azure_rm_datalakestore
description: "Manage Azure Data Lake Storage Gen1 accounts."
api_version: "2016-11-01"
provider: Microsoft.DataLakeStore
resource_type: accounts
generate_info: true
author: "Azure Magic Modules Generator"
doc_url: "https://learn.microsoft.com/en-us/azure/data-lake-store/"
properties:
  name:
    type: str
    required: true
    description: "Name of the Data Lake Store account."
  resource_group:
    type: str
    required: true
    description: "Name of the resource group."
  location:
    type: str
    required: true
    description: "Azure region."
    api_field: location
    location: body
  tier:
    type: str
    description: "Commitment tier for the account."
    choices:
      - Consumption
      - Commitment_1TB
      - Commitment_10TB
      - Commitment_100TB
      - Commitment_500TB
    api_field: newTier
    location: body
  encryption_state:
    type: str
    description: "State of encryption for the account."
    choices:
      - Enabled
      - Disabled
    api_field: encryptionState
    location: body
  firewall_state:
    type: str
    description: "State of the firewall for the account."
    choices:
      - Enabled
      - Disabled
    api_field: firewallState
    location: body
  firewall_allow_azure_ips:
    type: str
    description: "Whether to allow Azure service IPs through firewall."
    choices:
      - Enabled
      - Disabled
    api_field: firewallAllowAzureIps
    location: body
  tags:
    type: dict
    description: "Resource tags."
    location: tags
