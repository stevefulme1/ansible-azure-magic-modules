name: VirtualMachine
module_name: azure_rm_virtualmachine
description: "Manage Azure virtual machine instances."
api_version: "2024-03-01"
provider: Microsoft.Compute
resource_type: virtualMachines
generate_info: true
author: "Azure Magic Modules Generator"
doc_url: "https://learn.microsoft.com/en-us/azure/virtual-machines/"
properties:
  name:
    type: str
    required: true
    description: "Name of the virtual machine."
  resource_group:
    type: str
    required: true
    description: "Name of the resource group."
  location:
    type: str
    required: true
    description: "Azure region."
    api_field: location
    location: body
  vm_size:
    type: str
    required: true
    description: "Size of the virtual machine."
    api_field: hardwareProfile.vmSize
    location: body
  admin_username:
    type: str
    description: "Administrator username for the virtual machine."
    api_field: osProfile.adminUsername
    location: body
  admin_password:
    type: str
    description: "Administrator password for the virtual machine."
    api_field: osProfile.adminPassword
    location: body
    no_log: true
  admin_ssh_key:
    type: str
    description: "SSH public key for the virtual machine."
    api_field: osProfile.linuxConfiguration.ssh.publicKeys
    location: body
  os_disk_type:
    type: str
    description: "Managed disk storage account type for the OS disk."
    api_field: storageProfile.osDisk.managedDisk.storageAccountType
    location: body
    choices:
      - Premium_LRS
      - StandardSSD_LRS
      - Standard_LRS
  os_disk_size_gb:
    type: int
    description: "Size of the OS disk in GB."
    api_field: storageProfile.osDisk.diskSizeGB
    location: body
  image_publisher:
    type: str
    description: "Publisher of the VM image."
    api_field: storageProfile.imageReference.publisher
    location: body
  image_offer:
    type: str
    description: "Offer of the VM image."
    api_field: storageProfile.imageReference.offer
    location: body
  image_sku:
    type: str
    description: "SKU of the VM image."
    api_field: storageProfile.imageReference.sku
    location: body
  image_version:
    type: str
    description: "Version of the VM image."
    api_field: storageProfile.imageReference.version
    location: body
    default: "latest"
  network_interface_ids:
    type: list
    element_type: str
    description: "List of network interface resource IDs."
    api_field: networkProfile.networkInterfaces
    location: body
  availability_set_id:
    type: str
    description: "Resource ID of the availability set."
    api_field: availabilitySet.id
    location: body
  zone:
    type: str
    description: "Availability zone for the virtual machine."
    api_field: zones
    location: body
  tags:
    type: dict
    description: "Resource tags."
    location: tags
