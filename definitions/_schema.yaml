# ============================================================================
# Azure Magic Module — Resource Definition Schema Reference
# ============================================================================
# This file documents the YAML schema used to define Azure resources.
# Each .yaml file in this directory (except this one) describes one Azure
# resource and produces one Ansible module (plus an optional _info module).
#
# The generator reads these definitions and produces fully-functional Ansible
# modules that use azure.azcollection's base classes.
# ============================================================================

# ---- Required top-level fields --------------------------------------------

# name: PascalCase resource name used in class names and object references
name: VirtualNetwork

# module_name: snake_case Ansible module name (azure_rm_ prefix by convention)
module_name: azure_rm_virtualnetwork

# description: one-line summary used in DOCUMENTATION short_description
description: Manage Azure Virtual Networks

# api_version: Azure REST API version for this resource type
api_version: "2024-03-01"

# provider: Azure resource provider namespace
provider: Microsoft.Network

# resource_type: ARM resource type (under the provider)
resource_type: virtualNetworks

# ---- Optional top-level fields --------------------------------------------

# generate_info: if true, also generate an _info (facts) module (default: true)
generate_info: true

# author: module author line
author: "Azure Magic Modules Generator"

# doc_url: link shown in DOCUMENTATION seealso
doc_url: "https://learn.microsoft.com/en-us/rest/api/virtualnetwork/"

# idempotent_properties: list of properties that determine identity for
# update-vs-create decisions (beyond resource_group + name)
idempotent_properties: []

# ---- properties -----------------------------------------------------------
# Each property maps to an Ansible module option AND an Azure API body field.
#
# Field reference:
#   type:          str | int | float | bool | list | dict (Ansible types)
#   required:      true/false (default: false)
#   description:   shown in module DOCUMENTATION
#   default:       default value
#   choices:       list of allowed values
#   api_field:     PascalCase Azure API field name (default: auto-converted
#                  from the property key, e.g. address_space → AddressSpace)
#   location:      where in the API body this field goes:
#                    "body"       → top-level body field (default)
#                    "properties" → nested under .properties in the API body
#                    "tags"       → merged into .tags
#   updatable:     whether this field can be changed after creation (default: true)
#   flatten:       for nested objects, flatten sub-fields into top-level params
#   elements:      for type=list, the element type (str, dict, etc.)
#   suboptions:    for type=list/dict with elements=dict, nested option spec
#
properties:
  name:
    type: str
    required: true
    description: Name of the virtual network.
    api_field: Name
    location: body

  resource_group:
    type: str
    required: true
    description: Name of the resource group.

  location:
    type: str
    required: true
    description: Azure region.
    api_field: location
    location: body

  address_prefixes:
    type: list
    elements: str
    required: true
    description: List of address spaces in CIDR notation.
    api_field: addressSpace.addressPrefixes
    location: properties

  dns_servers:
    type: list
    elements: str
    description: Custom DNS server IP addresses.
    api_field: dhcpOptions.dnsServers
    location: properties
    default: []

  tags:
    type: dict
    description: Resource tags.
    location: tags
