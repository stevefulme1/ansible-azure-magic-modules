name: SqlDatabase
module_name: azure_rm_sqldatabase
description: "Manage Azure SQL Database instances."
api_version: "2023-08-01-preview"
provider: Microsoft.Sql
resource_type: servers/databases
generate_info: true
author: "Azure Magic Modules Generator"
doc_url: "https://learn.microsoft.com/en-us/azure/azure-sql/database/single-database-overview"
properties:
  name:
    type: str
    required: true
    description: "Name of the SQL database."
  resource_group:
    type: str
    required: true
    description: "Name of the resource group."
  server_name:
    type: str
    required: true
    description: "Name of the parent SQL server."
  location:
    type: str
    required: true
    description: "Azure region."
    api_field: location
    location: body
  sku_name:
    type: str
    description: "Name of the SKU for the database."
    choices:
      - "Basic"
      - "S0"
      - "S1"
      - "S2"
      - "S3"
      - "P1"
      - "P2"
      - "P4"
      - "P6"
      - "GP_Gen5_2"
      - "GP_Gen5_4"
      - "GP_Gen5_8"
      - "BC_Gen5_2"
      - "BC_Gen5_4"
      - "HS_Gen5_2"
    api_field: sku.name
    location: body
  sku_tier:
    type: str
    description: "Tier of the SKU for the database."
    choices:
      - "Basic"
      - "Standard"
      - "Premium"
      - "GeneralPurpose"
      - "BusinessCritical"
      - "Hyperscale"
    api_field: sku.tier
    location: body
  max_size_bytes:
    type: int
    description: "Maximum size of the database in bytes."
    api_field: maxSizeBytes
    location: properties
  collation:
    type: str
    description: "Collation of the database."
    default: "SQL_Latin1_General_CP1_CI_AS"
    api_field: collation
    location: properties
  zone_redundant:
    type: bool
    description: "Whether the database is zone redundant."
    api_field: zoneRedundant
    location: properties
  tags:
    type: dict
    description: "Resource tags."
    location: tags
