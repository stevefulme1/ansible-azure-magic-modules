name: NatGateway
module_name: azure_rm_natgateway
description: "Manage Azure NAT gateways."
api_version: "2024-03-01"
provider: Microsoft.Network
resource_type: natGateways
generate_info: true
author: "Azure Magic Modules Generator"
doc_url: "https://learn.microsoft.com/en-us/azure/nat-gateway/nat-overview"
properties:
  name:
    type: str
    required: true
    description: "Name of the NAT gateway."
  resource_group:
    type: str
    required: true
    description: "Name of the resource group."
  location:
    type: str
    required: true
    description: "Azure region."
    api_field: location
    location: body
  sku_name:
    type: str
    description: "SKU name of the NAT gateway."
    api_field: sku.name
    location: body
    choices:
      - Standard
  idle_timeout_in_minutes:
    type: int
    description: "Idle timeout in minutes."
    api_field: idleTimeoutInMinutes
    location: body
    default: 4
  public_ip_address_ids:
    type: list
    description: "List of public IP address resource IDs."
    api_field: publicIpAddresses
    location: body
    element:
      type: str
  public_ip_prefix_ids:
    type: list
    description: "List of public IP prefix resource IDs."
    api_field: publicIpPrefixes
    location: body
    element:
      type: str
  zones:
    type: list
    description: "List of availability zones."
    api_field: zones
    location: body
    element:
      type: str
  tags:
    type: dict
    description: "Resource tags."
    location: tags
