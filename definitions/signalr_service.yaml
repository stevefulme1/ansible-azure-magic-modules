name: SignalRService
module_name: azure_rm_signalrservice
description: "Manage Azure SignalR Service instances."
api_version: "2024-03-01"
provider: Microsoft.SignalRService
resource_type: signalR
generate_info: true
author: "Azure Magic Modules Generator"
doc_url: "https://learn.microsoft.com/en-us/azure/azure-signalr/signalr-overview"
properties:
  name:
    type: str
    required: true
    description: "Name of the SignalR Service."
  resource_group:
    type: str
    required: true
    description: "Name of the resource group."
  location:
    type: str
    required: true
    description: "Azure region."
    api_field: location
    location: body
  sku_name:
    type: str
    description: "SKU name of the SignalR Service."
    api_field: sku.name
    location: body
    choices:
      - Free_F1
      - Standard_S1
      - Premium_P1
  sku_capacity:
    type: int
    description: "SKU capacity (unit count) of the SignalR Service."
    api_field: sku.capacity
    location: body
  service_mode:
    type: str
    description: "Service mode of the SignalR Service."
    api_field: features.serviceMode
    location: body
    choices:
      - Default
      - Serverless
      - Classic
  cors_allowed_origins:
    type: list
    description: "List of allowed origins for CORS."
    api_field: cors.allowedOrigins
    location: body
  tags:
    type: dict
    description: "Resource tags."
    location: tags
