name: FrontDoorProfile
module_name: azure_rm_frontdoorprofile
description: "Manage Azure Front Door Standard and Premium profiles."
api_version: "2024-03-01"
provider: Microsoft.Cdn
resource_type: profiles
generate_info: true
author: "Azure Magic Modules Generator"
doc_url: "https://learn.microsoft.com/en-us/azure/frontdoor/front-door-overview"
properties:
  name:
    type: str
    required: true
    description: "Name of the Front Door profile."
  resource_group:
    type: str
    required: true
    description: "Name of the resource group."
  location:
    type: str
    required: true
    description: "Azure region."
    api_field: location
    location: body
  sku_name:
    type: str
    description: "SKU name of the Front Door profile."
    api_field: sku.name
    location: body
    choices:
      - Standard_AzureFrontDoor
      - Premium_AzureFrontDoor
  origin_response_timeout_seconds:
    type: int
    description: "Timeout in seconds for origin responses."
    api_field: originResponseTimeoutSeconds
    location: body
  tags:
    type: dict
    description: "Resource tags."
    location: tags
