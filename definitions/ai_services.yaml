name: AIServices
module_name: azure_rm_aiservices
description: "Manage Azure AI Services multi-service accounts."
api_version: "2023-05-01"
provider: Microsoft.CognitiveServices
resource_type: accounts
generate_info: true
author: "Azure Magic Modules Generator"
doc_url: "https://learn.microsoft.com/en-us/azure/ai-services/"

properties:
  name:
    type: str
    required: true
    description: "Name of the AI Services account."
  resource_group:
    type: str
    required: true
    description: "Name of the resource group."
  location:
    type: str
    required: true
    description: "Azure region."
    api_field: location
    location: body
  sku_name:
    type: str
    required: true
    description: "SKU name of the AI Services account."
    api_field: sku.name
    location: body
    choices:
      - F0
      - S0
      - S1
      - S2
      - S3
  kind:
    type: str
    description: "The kind of Cognitive Services account."
    api_field: kind
    location: body
    default: "AIServices"
  custom_subdomain_name:
    type: str
    description: "Custom subdomain name for the account."
    api_field: customSubDomainName
    location: properties
  public_network_access:
    type: str
    description: "Whether public network access is allowed."
    api_field: publicNetworkAccess
    location: properties
    choices:
      - Enabled
      - Disabled
  tags:
    type: dict
    description: "Resource tags."
    location: tags
