name: AppConfiguration
module_name: azure_rm_appconfiguration
description: "Manage Azure App Configuration Store instances."
api_version: "2023-03-01"
provider: Microsoft.AppConfiguration
resource_type: configurationStores
generate_info: true
author: "Azure Magic Modules Generator"
doc_url: "https://learn.microsoft.com/en-us/azure/azure-app-configuration/overview"
properties:
  name:
    type: str
    required: true
    description: "Name of the App Configuration store."
  resource_group:
    type: str
    required: true
    description: "Name of the resource group."
  location:
    type: str
    required: true
    description: "Azure region."
    api_field: location
    location: body
  sku_name:
    type: str
    description: "SKU name of the App Configuration store."
    choices:
      - Free
      - Standard
    api_field: sku.name
    location: body
  disable_local_auth:
    type: bool
    description: "Whether local authentication is disabled."
    api_field: disableLocalAuth
    location: body
  enable_purge_protection:
    type: bool
    description: "Whether purge protection is enabled."
    api_field: enablePurgeProtection
    location: body
  soft_delete_retention_in_days:
    type: int
    description: "Soft delete retention period in days."
    api_field: softDeleteRetentionInDays
    location: body
  public_network_access:
    type: str
    description: "Whether public network access is allowed."
    choices:
      - Enabled
      - Disabled
    api_field: publicNetworkAccess
    location: body
  encryption_key_vault_key_identifier:
    type: str
    description: "Key Vault key identifier for encryption."
    api_field: encryption.keyVaultProperties.keyIdentifier
    location: body
  identity_type:
    type: str
    description: "Type of managed identity."
    choices:
      - SystemAssigned
      - UserAssigned
      - None
    api_field: identity.type
    location: body
  tags:
    type: dict
    description: "Resource tags."
    location: tags
