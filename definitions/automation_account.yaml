name: AutomationAccount
module_name: azure_rm_automationaccount
description: "Manage Azure Automation Account instances."
api_version: "2023-11-01"
provider: Microsoft.Automation
resource_type: automationAccounts
generate_info: true
author: "Azure Magic Modules Generator"
doc_url: "https://learn.microsoft.com/en-us/azure/automation/automation-create-standalone-account"
properties:
  name:
    type: str
    required: true
    description: "Name of the Automation Account."
  resource_group:
    type: str
    required: true
    description: "Name of the resource group."
  location:
    type: str
    required: true
    description: "Azure region."
    api_field: location
    location: body
  sku_name:
    type: str
    description: "SKU name of the Automation Account."
    choices:
      - Free
      - Basic
    api_field: sku.name
    location: body
  identity_type:
    type: str
    description: "Type of managed identity for the Automation Account."
    choices:
      - SystemAssigned
      - UserAssigned
      - None
    api_field: identity.type
    location: body
  public_network_access:
    type: bool
    description: "Whether public network access is allowed."
    api_field: publicNetworkAccess
    location: body
  disable_local_auth:
    type: bool
    description: "Whether local authentication is disabled."
    api_field: disableLocalAuth
    location: body
  encryption_key_source:
    type: str
    description: "Encryption key source for the Automation Account."
    choices:
      - Microsoft.Automation
      - Microsoft.Keyvault
    api_field: encryption.keySource
    location: body
  tags:
    type: dict
    description: "Resource tags."
    location: tags
