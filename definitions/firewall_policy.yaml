name: FirewallPolicy
module_name: azure_rm_firewallpolicy
description: "Manage Azure firewall policies."
api_version: "2024-03-01"
provider: Microsoft.Network
resource_type: firewallPolicies
generate_info: true
author: "Azure Magic Modules Generator"
doc_url: "https://learn.microsoft.com/en-us/azure/firewall/policy-rule-sets"
properties:
  name:
    type: str
    required: true
    description: "Name of the firewall policy."
  resource_group:
    type: str
    required: true
    description: "Name of the resource group."
  location:
    type: str
    required: true
    description: "Azure region."
    api_field: location
    location: body
  sku_tier:
    type: str
    description: "SKU tier of the firewall policy."
    api_field: sku.tier
    location: body
    choices:
      - Standard
      - Premium
      - Basic
  threat_intel_mode:
    type: str
    description: "Threat intelligence operation mode."
    api_field: threatIntelMode
    location: body
    choices:
      - Alert
      - Deny
      - "Off"
  dns_servers:
    type: list
    description: "List of custom DNS server IP addresses."
    api_field: dnsSettings.servers
    location: body
    element:
      type: str
  enable_dns_proxy:
    type: bool
    description: "Enable DNS proxy on the firewall policy."
    api_field: dnsSettings.enableProxy
    location: body
  tags:
    type: dict
    description: "Resource tags."
    location: tags
