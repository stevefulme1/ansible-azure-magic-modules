name: Snapshot
module_name: azure_rm_snapshot
description: "Manage Azure Managed Disk Snapshot instances."
api_version: "2023-10-02"
provider: Microsoft.Compute
resource_type: snapshots
generate_info: true
author: "Azure Magic Modules Generator"
doc_url: "https://learn.microsoft.com/en-us/azure/virtual-machines/snapshot-copy-managed-disk"
properties:
  name:
    type: str
    required: true
    description: "Name of the snapshot."
  resource_group:
    type: str
    required: true
    description: "Name of the resource group."
  location:
    type: str
    required: true
    description: "Azure region."
    api_field: location
    location: body
  sku_name:
    type: str
    description: "SKU name of the snapshot."
    choices:
      - Standard_LRS
      - Premium_LRS
      - Standard_ZRS
    api_field: sku.name
    location: body
  creation_option:
    type: str
    description: "How the snapshot was created."
    choices:
      - Copy
      - Import
      - Empty
    api_field: creationData.createOption
    location: body
  source_resource_id:
    type: str
    description: "Resource ID of the source disk or snapshot."
    api_field: creationData.sourceResourceId
    location: body
  source_uri:
    type: str
    description: "URI of the source blob for import."
    api_field: creationData.sourceUri
    location: body
  disk_size_gb:
    type: int
    description: "Size of the snapshot in GB."
    api_field: diskSizeGB
    location: body
  os_type:
    type: str
    description: "OS type of the snapshot."
    choices:
      - Linux
      - Windows
    api_field: osType
    location: body
  tags:
    type: dict
    description: "Resource tags."
    location: tags
