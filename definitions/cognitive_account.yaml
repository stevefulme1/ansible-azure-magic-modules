name: CognitiveServicesAccount
module_name: azure_rm_cognitiveservicesaccount
description: "Manage Azure Cognitive Services accounts."
api_version: "2023-05-01"
provider: Microsoft.CognitiveServices
resource_type: accounts
generate_info: true
author: "Azure Magic Modules Generator"
doc_url: "https://learn.microsoft.com/en-us/azure/cognitive-services/"

properties:
  name:
    type: str
    required: true
    description: "Name of the Cognitive Services account."
  resource_group:
    type: str
    required: true
    description: "Name of the resource group."
  location:
    type: str
    required: true
    description: "Azure region."
    api_field: location
    location: body
  kind:
    type: str
    required: true
    description: "The kind of Cognitive Services account to create."
    api_field: kind
    location: body
    choices:
      - OpenAI
      - CognitiveServices
      - TextAnalytics
      - ComputerVision
      - Face
      - SpeechServices
      - FormRecognizer
      - ContentModerator
      - CustomVision.Training
      - CustomVision.Prediction
  sku_name:
    type: str
    required: true
    description: "SKU name of the Cognitive Services account."
    api_field: sku.name
    location: body
    choices:
      - F0
      - S0
      - S1
      - S2
      - S3
  custom_subdomain_name:
    type: str
    description: "Custom subdomain name for the account."
    api_field: customSubDomainName
    location: properties
  public_network_access:
    type: str
    description: "Whether public network access is allowed."
    api_field: publicNetworkAccess
    location: properties
    choices:
      - Enabled
      - Disabled
  network_acls:
    type: dict
    description: "Network ACL rules for the Cognitive Services account."
    api_field: networkAcls
    location: properties
    suboptions:
      default_action:
        type: str
        description: "Default action when no rule matches."
        api_field: networkAcls.defaultAction
        choices:
          - Allow
          - Deny
      ip_rules:
        type: list
        description: "List of IP address rules."
        api_field: networkAcls.ipRules
      virtual_network_rules:
        type: list
        description: "List of virtual network rules."
        api_field: networkAcls.virtualNetworkRules
  tags:
    type: dict
    description: "Resource tags."
    location: tags
