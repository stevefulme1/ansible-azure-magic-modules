name: BastionHost
module_name: azure_rm_bastionhost
description: "Manage Azure Bastion hosts."
api_version: "2024-03-01"
provider: Microsoft.Network
resource_type: bastionHosts
generate_info: true
author: "Azure Magic Modules Generator"
doc_url: "https://learn.microsoft.com/en-us/azure/bastion/bastion-overview"
properties:
  name:
    type: str
    required: true
    description: "Name of the Bastion host."
  resource_group:
    type: str
    required: true
    description: "Name of the resource group."
  location:
    type: str
    required: true
    description: "Azure region."
    api_field: location
    location: body
  sku_name:
    type: str
    description: "SKU name of the Bastion host."
    api_field: sku.name
    location: body
    choices:
      - Basic
      - Standard
      - Developer
  ip_configuration_subnet_id:
    type: str
    description: "Resource ID of the AzureBastionSubnet."
    api_field: ipConfigurations[0].subnet.id
    location: body
  ip_configuration_public_ip_id:
    type: str
    description: "Resource ID of the public IP for the Bastion host."
    api_field: ipConfigurations[0].publicIPAddress.id
    location: body
  enable_tunneling:
    type: bool
    description: "Enable native client tunneling support."
    api_field: enableTunneling
    location: body
  enable_shareable_link:
    type: bool
    description: "Enable shareable link for the Bastion host."
    api_field: enableShareableLink
    location: body
  tags:
    type: dict
    description: "Resource tags."
    location: tags
