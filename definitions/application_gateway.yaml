name: ApplicationGateway
module_name: azure_rm_applicationgateway
description: "Manage Azure application gateways."
api_version: "2024-03-01"
provider: Microsoft.Network
resource_type: applicationGateways
generate_info: true
author: "Azure Magic Modules Generator"
doc_url: "https://learn.microsoft.com/en-us/azure/application-gateway/overview"
properties:
  name:
    type: str
    required: true
    description: "Name of the application gateway."
  resource_group:
    type: str
    required: true
    description: "Name of the resource group."
  location:
    type: str
    required: true
    description: "Azure region."
    api_field: location
    location: body
  sku_name:
    type: str
    description: "SKU name of the application gateway."
    api_field: sku.name
    location: body
    choices:
      - Standard_Small
      - Standard_Medium
      - Standard_Large
      - WAF_Medium
      - WAF_Large
      - Standard_v2
      - WAF_v2
  sku_tier:
    type: str
    description: "SKU tier of the application gateway."
    api_field: sku.tier
    location: body
    choices:
      - Standard
      - WAF
      - Standard_v2
      - WAF_v2
  sku_capacity:
    type: int
    description: "Instance count of the application gateway."
    api_field: sku.capacity
    location: body
  gateway_ip_configuration_subnet_id:
    type: str
    description: "Resource ID of the subnet for gateway IP configuration."
    api_field: gatewayIPConfigurations[0].subnet.id
    location: body
  tags:
    type: dict
    description: "Resource tags."
    location: tags
