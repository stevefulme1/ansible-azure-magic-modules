name: SearchService
module_name: azure_rm_searchservice
description: "Manage Azure AI Search services."
api_version: "2023-11-01"
provider: Microsoft.Search
resource_type: searchServices
generate_info: true
author: "Azure Magic Modules Generator"
doc_url: "https://learn.microsoft.com/en-us/azure/search/"

properties:
  name:
    type: str
    required: true
    description: "Name of the search service."
  resource_group:
    type: str
    required: true
    description: "Name of the resource group."
  location:
    type: str
    required: true
    description: "Azure region."
    api_field: location
    location: body
  sku_name:
    type: str
    required: true
    description: "SKU tier of the search service."
    api_field: sku.name
    location: body
    choices:
      - free
      - basic
      - standard
      - standard2
      - standard3
      - storage_optimized_l1
      - storage_optimized_l2
  replica_count:
    type: int
    description: "Number of replicas for the search service."
    api_field: replicaCount
    location: properties
  partition_count:
    type: int
    description: "Number of partitions for the search service."
    api_field: partitionCount
    location: properties
  hosting_mode:
    type: str
    description: "Hosting mode for the search service."
    api_field: hostingMode
    location: properties
    choices:
      - default
      - highDensity
  public_network_access:
    type: str
    description: "Whether public network access is allowed."
    api_field: publicNetworkAccess
    location: properties
    choices:
      - enabled
      - disabled
  tags:
    type: dict
    description: "Resource tags."
    location: tags
