name: ManagementLock
module_name: azure_rm_managementlock
description: "Manage Azure management locks on resources."
api_version: "2020-05-01"
provider: Microsoft.Authorization
resource_type: locks
generate_info: true
author: "Azure Magic Modules Generator"
doc_url: "https://learn.microsoft.com/en-us/azure/azure-resource-manager/management/lock-resources"
properties:
  name:
    type: str
    required: true
    description: "Name of the management lock."
  scope:
    type: str
    required: true
    description: "The scope to apply the lock to."
    api_field: scope
    location: body
  lock_level:
    type: str
    required: true
    description: "The level of the management lock."
    api_field: level
    location: properties
    choices:
      - CanNotDelete
      - ReadOnly
  notes:
    type: str
    description: "Notes about the management lock."
    api_field: notes
    location: properties
