name: MonitorActionGroup
module_name: azure_rm_monitoractiongroup
description: "Manage Azure Monitor action groups."
api_version: "2023-01-01"
provider: Microsoft.Insights
resource_type: actionGroups
generate_info: true
author: "Azure Magic Modules Generator"
doc_url: "https://learn.microsoft.com/en-us/azure/azure-monitor/alerts/action-groups"
properties:
  name:
    type: str
    required: true
    description: "Name of the action group."
  resource_group:
    type: str
    required: true
    description: "Name of the resource group."
  location:
    type: str
    description: "Azure region."
    api_field: location
    location: body
    default: global
  group_short_name:
    type: str
    required: true
    description: "Short name of the action group (max 12 chars)."
    api_field: groupShortName
    location: properties
  enabled:
    type: bool
    description: "Whether the action group is enabled."
    api_field: enabled
    location: properties
    default: true
  email_receivers:
    type: list
    element_type: dict
    description: "List of email receivers."
    api_field: emailReceivers
    location: properties
    suboptions:
      name:
        type: str
        required: true
        description: "Name of the email receiver."
      email_address:
        type: str
        required: true
        description: "Email address of the receiver."
        api_field: emailAddress
      use_common_alert_schema:
        type: bool
        description: "Whether to use the common alert schema."
        api_field: useCommonAlertSchema
  sms_receivers:
    type: list
    element_type: dict
    description: "List of SMS receivers."
    api_field: smsReceivers
    location: properties
    suboptions:
      name:
        type: str
        required: true
        description: "Name of the SMS receiver."
      country_code:
        type: str
        required: true
        description: "Country code of the SMS receiver."
        api_field: countryCode
      phone_number:
        type: str
        required: true
        description: "Phone number of the SMS receiver."
        api_field: phoneNumber
  webhook_receivers:
    type: list
    element_type: dict
    description: "List of webhook receivers."
    api_field: webhookReceivers
    location: properties
    suboptions:
      name:
        type: str
        required: true
        description: "Name of the webhook receiver."
      service_uri:
        type: str
        required: true
        description: "URI of the webhook service."
        api_field: serviceUri
      use_common_alert_schema:
        type: bool
        description: "Whether to use the common alert schema."
        api_field: useCommonAlertSchema
  tags:
    type: dict
    description: "Resource tags."
    location: tags
