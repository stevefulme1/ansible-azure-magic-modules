name: StaticWebApp
module_name: azure_rm_staticwebapp
description: "Manage Azure Static Web App instances."
api_version: "2023-12-01"
provider: Microsoft.Web
resource_type: staticSites
generate_info: true
author: "Azure Magic Modules Generator"
doc_url: "https://learn.microsoft.com/en-us/azure/static-web-apps/overview"
properties:
  name:
    type: str
    required: true
    description: "Name of the Static Web App."
  resource_group:
    type: str
    required: true
    description: "Name of the resource group."
  location:
    type: str
    required: true
    description: "Azure region."
    api_field: location
    location: body
  sku_name:
    type: str
    description: "SKU name of the Static Web App."
    api_field: sku.name
    location: body
    choices:
      - Free
      - Standard
  repository_url:
    type: str
    description: "URL of the source code repository."
    api_field: repositoryUrl
    location: body
  branch:
    type: str
    description: "Branch name for the repository."
    api_field: branch
    location: body
  repository_token:
    type: str
    description: "Token for accessing the repository."
    api_field: repositoryToken
    location: body
  build_app_location:
    type: str
    description: "Path to the app source code relative to repo root."
    api_field: buildProperties.appLocation
    location: body
  build_api_location:
    type: str
    description: "Path to the API source code relative to repo root."
    api_field: buildProperties.apiLocation
    location: body
  build_output_location:
    type: str
    description: "Path to the build output relative to app location."
    api_field: buildProperties.outputLocation
    location: body
  tags:
    type: dict
    description: "Resource tags."
    location: tags
