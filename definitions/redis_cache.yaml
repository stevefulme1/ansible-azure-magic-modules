name: RedisCache
module_name: azure_rm_rediscache
description: "Manage Azure Cache for Redis instances."
api_version: "2024-03-01"
provider: Microsoft.Cache
resource_type: redis
generate_info: true
author: "Azure Magic Modules Generator"
doc_url: "https://learn.microsoft.com/en-us/azure/azure-cache-for-redis/cache-overview"
properties:
  name:
    type: str
    required: true
    description: "Name of the Redis cache."
  resource_group:
    type: str
    required: true
    description: "Name of the resource group."
  location:
    type: str
    required: true
    description: "Azure region."
    api_field: location
    location: body
  sku_name:
    type: str
    required: true
    description: "Name of the SKU for the Redis cache."
    choices:
      - "Basic"
      - "Standard"
      - "Premium"
    api_field: sku.name
    location: body
  sku_family:
    type: str
    required: true
    description: "SKU family for the Redis cache."
    choices:
      - "C"
      - "P"
    api_field: sku.family
    location: body
  sku_capacity:
    type: int
    required: true
    description: "Size of the Redis cache instance."
    choices:
      - 0
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
    api_field: sku.capacity
    location: body
  enable_non_ssl_port:
    type: bool
    description: "Whether the non-SSL port is enabled."
    default: false
    api_field: enableNonSslPort
    location: properties
  minimum_tls_version:
    type: str
    description: "Minimum TLS version required by clients."
    choices:
      - "1.0"
      - "1.1"
      - "1.2"
    api_field: minimumTlsVersion
    location: properties
  redis_configuration:
    type: dict
    description: "Redis configuration settings."
    api_field: redisConfiguration
    location: properties
  tags:
    type: dict
    description: "Resource tags."
    location: tags
