name: MaintenanceConfiguration
module_name: azure_rm_maintenanceconfiguration
description: "Manage Azure Maintenance Configuration instances."
api_version: "2023-10-01-preview"
provider: Microsoft.Maintenance
resource_type: maintenanceConfigurations
generate_info: true
author: "Azure Magic Modules Generator"
doc_url: "https://learn.microsoft.com/en-us/azure/virtual-machines/maintenance-configurations"
properties:
  name:
    type: str
    required: true
    description: "Name of the Maintenance Configuration."
  resource_group:
    type: str
    required: true
    description: "Name of the resource group."
  location:
    type: str
    required: true
    description: "Azure region."
    api_field: location
    location: body
  maintenance_scope:
    type: str
    description: "Scope of the maintenance configuration."
    choices:
      - Host
      - OSImage
      - Extension
      - InGuestPatch
      - SQLDB
      - SQLManagedInstance
      - Resource
    api_field: maintenanceScope
    location: body
  visibility:
    type: str
    description: "Visibility of the maintenance configuration."
    choices:
      - Custom
      - Public
    api_field: visibility
    location: body
  start_date_time:
    type: str
    description: "Start date and time for the maintenance window."
    api_field: maintenanceWindow.startDateTime
    location: body
  expiration_date_time:
    type: str
    description: "Expiration date and time for the maintenance window."
    api_field: maintenanceWindow.expirationDateTime
    location: body
  duration:
    type: str
    description: "Duration of the maintenance window."
    api_field: maintenanceWindow.duration
    location: body
  time_zone:
    type: str
    description: "Time zone for the maintenance window."
    api_field: maintenanceWindow.timeZone
    location: body
  recur_every:
    type: str
    description: "Recurrence pattern for the maintenance window."
    api_field: maintenanceWindow.recurEvery
    location: body
  tags:
    type: dict
    description: "Resource tags."
    location: tags
