name: CdnProfile
module_name: azure_rm_cdnprofile
description: "Manage Azure CDN Profile instances."
api_version: "2024-02-01"
provider: Microsoft.Cdn
resource_type: profiles
generate_info: true
author: "Azure Magic Modules Generator"
doc_url: "https://learn.microsoft.com/en-us/azure/cdn/cdn-overview"
properties:
  name:
    type: str
    required: true
    description: "Name of the CDN Profile."
  resource_group:
    type: str
    required: true
    description: "Name of the resource group."
  location:
    type: str
    required: true
    description: "Azure region."
    api_field: location
    location: body
  sku_name:
    type: str
    description: "SKU name of the CDN Profile."
    api_field: sku.name
    location: body
    choices:
      - Standard_Microsoft
      - Standard_Akamai
      - Standard_Verizon
      - Premium_Verizon
      - Custom_Verizon
  tags:
    type: dict
    description: "Resource tags."
    location: tags
