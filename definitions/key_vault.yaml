name: KeyVault
module_name: azure_rm_keyvault
description: "Manage Azure Key Vault instances."
api_version: "2023-07-01"
provider: Microsoft.KeyVault
resource_type: vaults
generate_info: true
author: "Azure Magic Modules Generator"
doc_url: "https://learn.microsoft.com/en-us/azure/key-vault/"
properties:
  name:
    type: str
    required: true
    description: "Name of the Key Vault."
  resource_group:
    type: str
    required: true
    description: "Name of the resource group."
  location:
    type: str
    required: true
    description: "Azure region."
    api_field: location
    location: body
  sku_name:
    type: str
    required: true
    description: "SKU name for the Key Vault."
    api_field: sku.name
    location: properties
    choices:
      - standard
      - premium
  tenant_id:
    type: str
    required: true
    description: "The Azure Active Directory tenant ID for the vault."
    api_field: tenantId
    location: properties
  enabled_for_deployment:
    type: bool
    description: "Whether VMs can retrieve certificates stored as secrets."
    api_field: enabledForDeployment
    location: properties
  enabled_for_disk_encryption:
    type: bool
    description: "Whether Azure Disk Encryption can retrieve secrets."
    api_field: enabledForDiskEncryption
    location: properties
  enabled_for_template_deployment:
    type: bool
    description: "Whether Azure Resource Manager can retrieve secrets."
    api_field: enabledForTemplateDeployment
    location: properties
  enable_soft_delete:
    type: bool
    description: "Whether soft delete is enabled for the vault."
    api_field: enableSoftDelete
    location: properties
    default: true
  soft_delete_retention_in_days:
    type: int
    description: "Number of days to retain soft-deleted vaults."
    api_field: softDeleteRetentionInDays
    location: properties
    default: 90
  enable_purge_protection:
    type: bool
    description: "Whether purge protection is enabled for the vault."
    api_field: enablePurgeProtection
    location: properties
  enable_rbac_authorization:
    type: bool
    description: "Whether RBAC authorization is used for data actions."
    api_field: enableRbacAuthorization
    location: properties
  public_network_access:
    type: str
    description: "Whether the vault accepts traffic from public networks."
    api_field: publicNetworkAccess
    location: properties
    choices:
      - Enabled
      - Disabled
  network_acls_default_action:
    type: str
    description: "Default action for network ACLs."
    api_field: networkAcls.defaultAction
    location: properties
    choices:
      - Allow
      - Deny
  tags:
    type: dict
    description: "Resource tags."
    location: tags
