name: SqlServer
module_name: azure_rm_sqlserver
description: "Manage Azure SQL Server instances."
api_version: "2023-08-01-preview"
provider: Microsoft.Sql
resource_type: servers
generate_info: true
author: "Azure Magic Modules Generator"
doc_url: "https://learn.microsoft.com/en-us/azure/azure-sql/database/sql-database-paas-overview"
properties:
  name:
    type: str
    required: true
    description: "Name of the SQL server."
  resource_group:
    type: str
    required: true
    description: "Name of the resource group."
  location:
    type: str
    required: true
    description: "Azure region."
    api_field: location
    location: body
  administrator_login:
    type: str
    description: "Administrator login name for the server."
    api_field: administratorLogin
    location: properties
  administrator_login_password:
    type: str
    no_log: true
    description: "Administrator login password for the server."
    api_field: administratorLoginPassword
    location: properties
  version:
    type: str
    description: "Server version."
    choices:
      - "12.0"
    api_field: version
    location: properties
  minimal_tls_version:
    type: str
    description: "Minimal TLS version enforced by the server."
    default: "1.2"
    choices:
      - "1.0"
      - "1.1"
      - "1.2"
    api_field: minimalTlsVersion
    location: properties
  public_network_access:
    type: str
    description: "Whether public endpoint access is allowed."
    choices:
      - "Enabled"
      - "Disabled"
    api_field: publicNetworkAccess
    location: properties
  tags:
    type: dict
    description: "Resource tags."
    location: tags
